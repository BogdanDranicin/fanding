services:
  - type: web
    name: funding-backend
    runtime: docker
    dockerfilePath: ./funding-service/backend/Dockerfile
    dockerContext: ./funding-service/backend
    # На free-тарифе сервис останавливается после 15 мин без входящего трафика
    # (холодный старт ~30–60 с при пробуждении). Пока держим его тёплым в окне
    # публикации курсов через .github/workflows/keepalive.yml (бесплатно).
    #
    # ПЕРЕХОД НА ПЛАТНЫЙ ПЛАН (когда окупится): поменять `plan: free` → `plan: starter`.
    # Тогда сервис не спит вообще, и keepalive больше не нужен — отключить workflow
    # keepalive (Actions → keepalive-cbr-window → ⋯ → Disable workflow) или удалить файл.
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      # Cloudflare Pages URL фронтенда, напр. https://funding.pages.dev —
      # фиксирует origin для WebSocket и CORS. До деплоя фронта можно оставить пустым (=*).
      - key: ALLOWED_ORIGIN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: MOEX_POLL_INTERVAL_MS
        value: 250
      - key: BACKEND_PORT
        value: 10000
      - key: LOG_LEVEL
        value: warn
