server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers at server scope so proxied routes (/api, /ws) inherit them.
    # NB: an `add_header` inside a location REPLACES this whole inherited set, so any
    # location that adds its own header must re-declare the ones it still needs.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline';" always;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Hashed build assets (index-<hash>.js/.css) are content-addressed and never
    # change under a given name, so cache them hard.
    location /assets/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA shell: index.html must NOT be cached, otherwise a browser keeps loading a
    # stale asset hash after a deploy (users see the old app until a hard refresh).
    # Re-declare the security headers here — the Cache-Control add_header below would
    # otherwise drop the inherited ones for HTML responses.
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline';" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
