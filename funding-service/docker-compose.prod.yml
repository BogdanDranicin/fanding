networks:
  funding-net:
    driver: bridge

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - funding-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    # Публикуем только на localhost: наружу сервис отдаёт системный nginx,
    # который проксирует /api и /ws на 127.0.0.1:8080 (см. конфиг nginx сервера).
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      MOEX_POLL_INTERVAL_MS: ${MOEX_POLL_INTERVAL_MS:-250}
      BACKEND_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - funding-net

  frontend:
    build: ./frontend
    restart: unless-stopped
    # Системный nginx (HTTPS, Let's Encrypt) проксирует "/" на 127.0.0.1:3000.
    # Публикуем контейнер на 3000, чтобы не конфликтовать с хостовым nginx на :80.
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - funding-net

volumes:
  postgres-data:
